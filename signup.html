<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - MyCME</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-900">MyCME</h1>
            <p class="text-gray-500">Create your professional account</p>
        </div>

        <form>
            <div class="mb-4">
                <label class="block text-sm font-semibold mb-1">I am a:</label>
                <select class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
                    <option value="user">Doctor / Nurse (User)</option>
                    <option value="publisher">College / University (Publisher)</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="block text-sm font-semibold mb-1">Full Name</label>
                <input type="text" placeholder="Dr. Kamal Perera" class="w-full p-2 border rounded-lg outline-none focus:border-blue-500">
            </div>

            <div class="mb-4">
                <label class="block text-sm font-semibold mb-1">Email Address</label>
                <input type="email" placeholder="kamal@example.com" class="w-full p-2 border rounded-lg outline-none focus:border-blue-500">
            </div>

            <div class="mb-4">
                <label class="block text-sm font-semibold mb-1">Password</label>
                <input type="password" placeholder="••••••••" class="w-full p-2 border rounded-lg outline-none focus:border-blue-500">
            </div>

            <div class="mb-6">
                <label class="block text-sm font-semibold mb-1">Workplace / Hospital</label>
                <input type="text" placeholder="Teaching Hospital..." class="w-full p-2 border rounded-lg outline-none focus:border-blue-500">
            </div>

            <button type="button" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition">
                Create Account
            </button>
        </form>

        <p class="text-center mt-6 text-sm text-gray-600">
            Already have an account? <a href="#" class="text-blue-600 font-bold">Login</a>
        </p>
    </div>

</body>
</html>
