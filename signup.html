<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - MyCME</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-blue-50 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-blue-900 tracking-tighter">MyCME</h1>
            <p class="text-gray-500 italic text-sm font-medium uppercase tracking-widest mt-1">Medical Education Tracker</p>
        </div>

        <form id="signupForm">
            <div class="mb-4">
                <label class="block text-sm font-semibold mb-1 text-gray-700">Register as:</label>
                <select id="role" class="w-full p-2.5 border rounded-lg bg-gray-50 outline-none focus:ring-2 focus:ring-blue-400">
                    <option value="user">Doctor / Nurse (User)</option>
                    <option value="publisher">College / University (Publisher)</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="block text-sm font-semibold mb-1 text-gray-700">Full Name</label>
                <input type="text" id="fullName" placeholder="Dr. Kamal Perera" class="w-full p-2.5 border rounded-lg outline-none focus:border-blue-500" required>
            </div>

            <div class="mb-4">
                <label class="block text-sm font-semibold mb-1 text-gray-700">Email Address</label>
                <input type="email" id="email" placeholder="kamal@example.com" class="w-full p-2.5 border rounded-lg outline-none focus:border-blue-500" required>
            </div>

            <div class="mb-4">
                <label class="block text-sm font-semibold mb-1 text-gray-700">Password</label>
                <div class="relative">
                    <input type="password" id="pass" placeholder="••••••••" class="w-full p-2.5 border rounded-lg outline-none focus:border-blue-500" required>
                    <button type="button" id="toggleBtn" class="absolute right-2 top-2 text-xs bg-gray-200 hover:bg-gray-300 px-2 py-1 rounded font-bold transition">SHOW</button>
                </div>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-semibold mb-1 text-gray-700">Workplace / Hospital</label>
                <input type="text" id="workplace" placeholder="Teaching Hospital..." class="w-full p-2.5 border rounded-lg outline-none focus:border-blue-500" required>
            </div>

            <button type="submit" id="btn" class="w-full bg-blue-600 text-white font-bold py-3.5 rounded-xl hover:bg-blue-700 shadow-lg shadow-blue-200 transition duration-300">
                Create Account
            </button>
        </form>
    </div>

    <script>
        // 1. මුලින්ම Supabase එක Initialize කරනවා
        const SUPABASE_URL = 'https://ykiunbptdrsqwuuegyno.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlraXVuYnB0ZHJzcXd1dWVneW5vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0ODU0MDEsImV4cCI6MjA5MjA2MTQwMX0.-0Mnb18-efy03usDoVWlVJLJesdOQyFO2ztKNcGX1Ho';
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 2. Password Show/Hide Function එක
        document.getElementById('toggleBtn').addEventListener('click', function() {
            const passInput = document.getElementById('pass');
            if (passInput.type === "password") {
                passInput.type = "text";
                this.innerText = "HIDE";
            } else {
                passInput.type = "password";
                this.innerText = "SHOW";
            }
        });

        // 3. Form Submit Function එක
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('btn');
            btn.innerText = "Processing...";
            btn.disabled = true;

            const name = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            const role = document.getElementById('role').value;
            const workplace = document.getElementById('workplace').value;

            try {
                // Auth Account එක හදනවා
                const { data, error } = await _supabase.auth.signUp({
                    email: email,
                    password: password
                });

                if (error) throw error;

                // Profile Table එකට දත්ත දානවා
                const { error: dbError } = await _supabase
                    .from('profiles')
                    .insert([{ 
                        full_name: name, 
                        email: email, 
                        role: role, 
                        workplace: workplace,
                        cme_id: 'CME-' + Math.floor(1000 + Math.random() * 9000)
                    }]);

                if (dbError) throw dbError;

                alert("පට්ට මචන්! Account එක හැදුණා.");
                
            } catch (err) {
                alert("අවුලක් වුණා: " + err.message);
            } finally {
                btn.innerText = "Create Account";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
