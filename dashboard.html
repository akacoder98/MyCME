<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - MyCME</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-blue-900 text-white p-4 shadow-md">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold italic">MyCME Dashboard</h1>
            <button onclick="logout()" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg text-sm font-bold transition">Logout</button>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto p-6">
        <div class="bg-white p-8 rounded-3xl shadow-sm mb-6 border border-gray-100">
            <h2 id="userName" class="text-3xl font-black text-blue-900">Hi, Loading...</h2>
            <p id="workplace" class="text-gray-500">Fetching details...</p>
            <div class="mt-4 inline-flex bg-blue-50 text-blue-700 px-4 py-1.5 rounded-full text-xs font-bold border border-blue-100">
                Member ID: <span id="cmeId" class="ml-1">####</span>
            </div>
        </div>

        <div class="bg-white p-8 rounded-3xl shadow-sm mb-6 border-2 border-dashed border-blue-200">
            <h3 class="text-lg font-bold text-gray-800 mb-4">Upload New Certificate</h3>
            <div class="flex flex-col md:flex-row gap-4">
                <input type="file" id="fileInput" class="flex-1 p-2 border rounded-lg text-sm">
                <button onclick="uploadFile()" id="upBtn" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 transition">Upload & Earn Points</button>
            </div>
            <p class="text-xs text-gray-400 mt-2">* Upload PDF or Images of your medical certificates.</p>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
            <h3 class="text-lg font-bold text-gray-800 mb-4">My Submissions</h3>
            <div id="fileList" class="space-y-3 text-sm text-blue-600 font-medium italic">
                No certificates uploaded yet.
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ykiunbptdrsqwuuegyno.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlraXVuYnB0ZHJzcXd1dWVneW5vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0ODU0MDEsImV4cCI6MjA5MjA2MTQwMX0.-0Mnb18-efy03usDoVWlVJLJesdOQyFO2ztKNcGX1Ho';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function init() {
            const { data: { user } } = await sb.auth.getUser();
            if (!user) { window.location.href = "login.html"; return; }

            const { data: profile } = await sb.from('profiles').select('*').eq('email', user.email).single();
            if (profile) {
                document.getElementById('userName').innerText = "Hi, " + profile.full_name;
                document.getElementById('workplace').innerText = profile.workplace;
                document.getElementById('cmeId').innerText = profile.cme_id;
            }
        }

        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const btn = document.getElementById('upBtn');
            if (fileInput.files.length === 0) return alert("කරුණාකර ෆයිල් එකක් තෝරන්න!");

            const file = fileInput.files[0];
            const fileExt = file.name.split('.').pop();
            const fileName = `${Math.random()}.${fileExt}`;
            const filePath = `uploads/${fileName}`;

            btn.innerText = "Uploading...";
            btn.disabled = true;

            // 1. Supabase Storage එකට Upload කිරීම
            const { data, error } = await sb.storage
                .from('certificates')
                .upload(filePath, file);

            if (error) {
                alert("Upload Error: " + error.message);
            } else {
                // 2. Upload වුණාම ලින්ක් එක පෙන්නමු
                const { data: { publicUrl } } = sb.storage.from('certificates').getPublicUrl(filePath);
                const list = document.getElementById('fileList');
                if(list.innerText.includes("No certificates")) list.innerHTML = "";
                list.innerHTML += `<div class='p-2 bg-gray-50 rounded border border-gray-100'><a href="${publicUrl}" target="_blank">📄 View Certificate - Pending Approval</a></div>`;
                alert("අප්ලෝඩ් කිරීම සාර්ථකයි! ලකුණු එකතු කිරීම සඳහා පරිපාලක විසින් පරීක්ෂා කරනු ඇත.");
            }
            btn.innerText = "Upload & Earn Points";
            btn.disabled = false;
        }

        async function logout() { await sb.auth.signOut(); window.location.href = "login.html"; }
        init();
    </script>
</body>
</html>
