<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyCME Professional Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen font-sans flex text-slate-800">

    <aside class="w-64 bg-blue-900 text-white hidden md:flex flex-col sticky top-0 h-screen">
        <div class="p-6 text-center border-b border-blue-800">
            <h1 class="text-2xl font-black italic tracking-tighter">MyCME</h1>
            <p class="text-[10px] uppercase tracking-[0.2em] text-blue-300">Official Tracker</p>
        </div>
        <nav class="flex-1 p-4 space-y-2 mt-4">
            <a href="#" class="flex items-center space-x-3 p-3 bg-blue-800 rounded-xl transition"><i class="fas fa-th-large"></i> <span>Dashboard</span></a>
            <a href="#" onclick="toggleModal('addCmeModal')" class="flex items-center space-x-3 p-3 hover:bg-blue-800 rounded-xl transition"><i class="fas fa-plus-circle"></i> <span>Add CME</span></a>
            <a href="#" onclick="generatePDF()" class="flex items-center space-x-3 p-3 hover:bg-blue-800 rounded-xl transition"><i class="fas fa-file-pdf"></i> <span>Download Report</span></a>
        </nav>
        <div class="p-4 border-t border-blue-800 text-center">
            <p id="cmeIdNav" class="text-[10px] text-blue-300 mb-2 font-bold tracking-widest">CME-####</p>
            <button onclick="logout()" class="w-full bg-red-500/20 hover:bg-red-500 text-red-400 hover:text-white p-3 rounded-xl transition font-bold">Logout</button>
        </div>
    </aside>

    <main class="flex-1 p-4 md:p-8">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div class="flex items-center space-x-4">
                <img id="profilePic" src="https://ui-avatars.com/api/?name=User&background=0D8ABC&color=fff" class="w-16 h-16 rounded-2xl border-2 border-white shadow-md">
                <div>
                    <h2 id="userName" class="text-2xl font-bold font-sans">Welcome!</h2>
                    <p id="workplace" class="text-slate-500 text-sm italic">Loading details...</p>
                </div>
            </div>
            
            <div class="flex space-x-2">
                <select id="timeFilter" onchange="loadCmeData()" class="p-2 border rounded-xl text-sm outline-none bg-white font-semibold">
                    <option value="90">Last 3 Months</option>
                    <option value="365" selected>Last 1 Year</option>
                    <option value="all">All Records</option>
                </select>
                <button onclick="toggleModal('addCmeModal')" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-xl font-bold transition text-sm shadow-lg shadow-blue-200">
                    + Add CME
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="md:col-span-2 bg-gradient-to-br from-blue-700 to-blue-900 rounded-3xl p-8 text-white shadow-xl relative overflow-hidden">
                <h3 class="text-blue-200 uppercase text-xs font-bold tracking-widest">Total CME Score</h3>
                <div class="flex items-baseline space-x-2 mt-2">
                    <span id="totalPoints" class="text-7xl font-black">0.0</span>
                    <span class="text-blue-300 font-bold uppercase text-xs tracking-widest">Points earned</span>
                </div>
                <i class="fas fa-award absolute -right-2 -bottom-2 text-9xl text-white/10 rotate-12"></i>
            </div>
            <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 flex flex-col justify-center items-center">
                <div class="w-14 h-14 bg-green-100 text-green-600 rounded-full flex items-center justify-center mb-3">
                    <i class="fas fa-check-circle text-2xl"></i>
                </div>
                <h3 class="font-bold text-lg">Status</h3>
                <p class="text-green-500 text-xs font-black uppercase tracking-[0.2em]">Verified Doctor</p>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="p-6 border-b border-slate-50 flex justify-between items-center">
                <h3 class="font-bold text-lg">My CME Records</h3>
                <button onclick="generatePDF()" class="text-blue-600 hover:text-blue-800 text-xs font-bold"><i class="fas fa-file-pdf mr-1"></i> Export PDF Report</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-slate-400 text-[10px] uppercase font-bold tracking-widest">
                        <tr>
                            <th class="px-6 py-4">Date</th>
                            <th class="px-6 py-4">Topic / Course</th>
                            <th class="px-6 py-4">Organizer</th>
                            <th class="px-6 py-4">Points</th>
                            <th class="px-6 py-4">File</th>
                        </tr>
                    </thead>
                    <tbody id="cmeTableBody" class="divide-y divide-slate-50 text-sm"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="addCmeModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl p-6 border-t-8 border-blue-600">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold">Add CME Record</h3>
                <button onclick="toggleModal('addCmeModal')" class="text-slate-400 text-3xl leading-none">&times;</button>
            </div>
            <form id="cmeForm" class="space-y-4">
                <label class="block text-[10px] font-bold text-slate-400 uppercase ml-1">Date of Completion</label>
                <input type="date" id="cmeDate" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 transition" required>
                <input type="text" id="cmeTopic" placeholder="Topic / Programme Name" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 transition" required>
                <input type="text" id="cmeOrganizer" placeholder="Organizer (e.g. Health Ministry)" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 transition" required>
                <input type="number" step="0.5" id="cmePoints" placeholder="CME Points (e.g. 1.5)" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 transition" required>
                <div class="bg-blue-50 p-3 rounded-xl border border-blue-100">
                    <label class="block text-[10px] font-bold text-blue-500 uppercase mb-2">Upload Certificate</label>
                    <input type="file" id="cmeFile" class="text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-blue-600 file:text-white" required>
                </div>
                <button type="submit" id="saveBtn" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-200 hover:bg-blue-700 transition duration-300">Save Record</button>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ykiunbptdrsqwuuegyno.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlraXVuYnB0ZHJzcXd1dWVneW5vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0ODU0MDEsImV4cCI6MjA5MjA2MTQwMX0.-0Mnb18-efy03usDoVWlVJLJesdOQyFO2ztKNcGX1Ho';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let userProfile = null;
        let cmeRecords = [];

        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }

        async function init() {
            const { data: { user } } = await sb.auth.getUser();
            if (!user) { window.location.href = "login.html"; return; }

            const { data: profile } = await sb.from('profiles').select('*').eq('email', user.email).single();
            if (profile) {
                userProfile = profile;
                document.getElementById('userName').innerText = "Hi, " + profile.full_name;
                document.getElementById('workplace').innerText = profile.workplace;
                document.getElementById('cmeIdNav').innerText = profile.cme_id;
                document.getElementById('profilePic').src = `https://ui-avatars.com/api/?name=${profile.full_name}&background=0D8ABC&color=fff&rounded=true`;
            }
            loadCmeData();
        }

        async function loadCmeData() {
            const days = document.getElementById('timeFilter').value;
            // අපි SQL Policy එක හදලා තියෙන නිසා මෙතන Email එක දාලා filter කරන්න ඕනෙම නැහැ, 
            // හැබැයි පරෙස්සමට අපි තියමු.
            let query = sb.from('cme_records').select('*').order('date', { ascending: false });

            if(days !== 'all') {
                const limit = new Date();
                limit.setDate(limit.getDate() - parseInt(days));
                query = query.gte('date', limit.toISOString());
            }

            const { data, error } = await query;
            if (data) {
                cmeRecords = data;
                const tbody = document.getElementById('cmeTableBody');
                tbody.innerHTML = data.length ? "" : "<tr><td colspan='5' class='p-10 text-center text-slate-400 italic'>No records found.</td></tr>";
                let total = 0;
                data.forEach(rec => {
                    total += parseFloat(rec.points);
                    tbody.innerHTML += `
                        <tr class="hover:bg-slate-50 transition">
                            <td class="px-6 py-4 text-slate-500 font-medium">${rec.date}</td>
                            <td class="px-6 py-4 font-bold text-slate-800">${rec.topic}</td>
                            <td class="px-6 py-4 text-slate-600">${rec.organizer}</td>
                            <td class="px-6 py-4 font-black text-blue-600 text-lg">+${rec.points}</td>
                            <td class="px-6 py-4"><a href="${rec.cert_url}" target="_blank" class="bg-blue-50 text-blue-600 p-2 rounded-lg hover:bg-blue-600 hover:text-white transition"><i class="fas fa-eye"></i></a></td>
                        </tr>`;
                });
                document.getElementById('totalPoints').innerText = total.toFixed(1);
            }
        }

        document.getElementById('cmeForm').onsubmit = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            btn.innerText = "Processing..."; btn.disabled = true;

            const file = document.getElementById('cmeFile').files[0];
            const fileName = `${Date.now()}_${file.name}`;
            
            try {
                // 1. Storage Upload
                const { error: upErr } = await sb.storage.from('certificates').upload(`uploads/${fileName}`, file);
                if(upErr) throw upErr;
                const { data: { publicUrl } } = sb.storage.from('certificates').getPublicUrl(`uploads/${fileName}`);

                // 2. Database Insert
                const { error: dbErr } = await sb.from('cme_records').insert([{
                    user_email: userProfile.email,
                    date: document.getElementById('cmeDate').value,
                    topic: document.getElementById('cmeTopic').value,
                    organizer: document.getElementById('cmeOrganizer').value,
                    points: document.getElementById('cmePoints').value,
                    cert_url: publicUrl
                }]);
                if(dbErr) throw dbErr;

                alert("CME Record Saved Successfully!");
                toggleModal('addCmeModal');
                loadCmeData();
                document.getElementById('cmeForm').reset();
            } catch (err) { alert("Error: " + err.message); }
            finally { btn.innerText = "Save Record"; btn.disabled = false; }
        };

        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFillColor(13, 138, 188); doc.rect(0, 0, 210, 30, 'F');
            doc.setTextColor(255, 255, 255); doc.setFontSize(18); doc.text("MyCME OFFICIAL PERFORMANCE REPORT", 105, 20, null, null, "center");
            doc.setTextColor(40, 40, 40); doc.setFontSize(10);
            doc.text(`Doctor: ${userProfile.full_name}`, 20, 45);
            doc.text(`CME ID: ${userProfile.cme_id}`, 20, 52);
            doc.text(`Total Score: ${document.getElementById('totalPoints').innerText}`, 150, 45);
            doc.autoTable({ startY: 60, head: [['Date', 'Topic/Course', 'Organizer', 'Points']], body: cmeRecords.map(r => [r.date, r.topic, r.organizer, r.points]), theme: 'grid', headStyles: {fillColor: [13, 138, 188]} });
            doc.text("Verified by MyCME Portal Sri Lanka", 105, 285, null, null, "center");
            doc.save(`CME_Report_${userProfile.full_name}.pdf`);
        }

        async function logout() { await sb.auth.signOut(); window.location.href = "login.html"; }
        init();
    </script>
</body>
</html>
