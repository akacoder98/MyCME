<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyCME Professional Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen flex text-slate-800">

    <aside class="w-64 bg-blue-900 text-white hidden md:flex flex-col sticky top-0 h-screen">
        <div class="p-8 text-center border-b border-blue-800">
            <h1 class="text-2xl font-black tracking-tighter uppercase italic">MyCME</h1>
        </div>
        <nav class="flex-1 p-4 space-y-2 mt-4">
            <a href="#" class="flex items-center space-x-3 p-3 bg-blue-800 rounded-xl transition"><i class="fas fa-chart-line"></i> <span>Dashboard</span></a>
            <a href="#" onclick="toggleModal('addCmeModal')" class="flex items-center space-x-3 p-3 hover:bg-blue-800 rounded-xl transition"><i class="fas fa-plus"></i> <span>Add Record</span></a>
            <a href="#" onclick="generatePDF()" class="flex items-center space-x-3 p-3 hover:bg-blue-800 rounded-xl transition"><i class="fas fa-file-pdf"></i> <span>Download Report</span></a>
        </nav>
        <div class="p-4 border-t border-blue-800">
            <button onclick="logout()" class="w-full bg-red-500/10 hover:bg-red-600 text-red-500 hover:text-white p-3 rounded-xl transition font-bold text-sm">Logout</button>
        </div>
    </aside>

    <main class="flex-1 p-8">
        <div class="flex justify-between items-center mb-8">
            <div class="flex items-center space-x-4">
                <img id="profilePic" src="https://ui-avatars.com/api/?name=User&background=0D8ABC&color=fff" class="w-16 h-16 rounded-2xl border-2 border-white shadow-sm">
                <div>
                    <h2 id="userName" class="text-2xl font-bold">Loading...</h2>
                    <p id="cmeIdNav" class="text-blue-600 text-xs font-black tracking-widest uppercase">CME-####</p>
                </div>
            </div>
            <select id="timeFilter" onchange="loadCmeData()" class="p-2 border rounded-xl text-xs font-bold bg-white">
                <option value="90">Last 3 Months</option>
                <option value="365" selected>Last 1 Year</option>
                <option value="all">All Records</option>
            </select>
        </div>

        <div class="bg-gradient-to-r from-blue-700 to-blue-900 rounded-[2.5rem] p-10 text-white shadow-2xl mb-8 flex justify-between items-center relative overflow-hidden">
            <div class="relative z-10">
                <h3 class="text-blue-200 uppercase text-xs font-bold tracking-[0.2em] mb-2">Total CME Points</h3>
                <span id="totalPoints" class="text-8xl font-black">0.0</span>
            </div>
            <i class="fas fa-award text-[10rem] text-white/10 absolute right-4 -bottom-4 rotate-12"></i>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="p-6 border-b flex justify-between items-center">
                <h3 class="font-bold uppercase text-xs tracking-widest text-slate-400">Activity Log</h3>
                <button onclick="toggleModal('addCmeModal')" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-xs font-bold">+ New Entry</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-[10px] uppercase font-bold text-slate-400">
                        <tr>
                            <th class="px-6 py-4">Date</th>
                            <th class="px-6 py-4">Topic</th>
                            <th class="px-6 py-4">Organizer</th>
                            <th class="px-6 py-4 text-center">Points</th>
                            <th class="px-6 py-4 text-center">Doc</th>
                        </tr>
                    </thead>
                    <tbody id="cmeTableBody" class="text-sm"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="addCmeModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[2rem] shadow-2xl p-8">
            <h3 class="text-xl font-bold mb-6">New CME Entry</h3>
            <form id="cmeForm" class="space-y-4">
                <input type="date" id="cmeDate" class="w-full p-4 bg-slate-50 border rounded-xl outline-none" required>
                <input type="text" id="cmeTopic" placeholder="Topic Name" class="w-full p-4 bg-slate-50 border rounded-xl outline-none" required>
                <input type="text" id="cmeOrganizer" placeholder="Organizer" class="w-full p-4 bg-slate-50 border rounded-xl outline-none" required>
                <input type="number" step="0.5" id="cmePoints" placeholder="Points" class="w-full p-4 bg-slate-50 border rounded-xl outline-none" required>
                <input type="file" id="cmeFile" class="text-xs" required>
                <button type="submit" id="saveBtn" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg">Submit Record</button>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ykiunbptdrsqwuuegyno.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlraXVuYnB0ZHJzcXd1dWVneW5vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0ODU0MDEsImV4cCI6MjA5MjA2MTQwMX0.-0Mnb18-efy03usDoVWlVJLJesdOQyFO2ztKNcGX1Ho';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let userProfile = null;

        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }

        async function init() {
            const { data: { user } } = await sb.auth.getUser();
            if (!user) { window.location.href = "login.html"; return; }

            const { data: profile } = await sb.from('profiles').select('*').eq('email', user.email).single();
            if (profile) {
                userProfile = profile;
                document.getElementById('userName').innerText = profile.full_name;
                document.getElementById('cmeIdNav').innerText = profile.cme_id;
            }
            loadCmeData();
        }

        async function loadCmeData() {
            const days = document.getElementById('timeFilter').value;
            // RLS නිසා මෙතන Email filter එක නැතත් තමන්ගේ දත්ත විතරයි පේන්නේ.
            let query = sb.from('cme_records').select('*').order('date', { ascending: false });

            if(days !== 'all') {
                const limit = new Date();
                limit.setDate(limit.getDate() - parseInt(days));
                query = query.gte('date', limit.toISOString());
            }

            const { data } = await query;
            if (data) {
                const tbody = document.getElementById('cmeTableBody');
                tbody.innerHTML = "";
                let total = 0;
                data.forEach(rec => {
                    total += parseFloat(rec.points);
                    tbody.innerHTML += `<tr class="border-b"><td class="px-6 py-4">${rec.date}</td><td class="px-6 py-4 font-bold">${rec.topic}</td><td class="px-6 py-4">${rec.organizer}</td><td class="px-6 py-4 text-center font-black text-blue-600">${rec.points}</td><td class="px-6 py-4 text-center"><a href="${rec.cert_url}" target="_blank" class="text-blue-500"><i class="fas fa-file-pdf"></i></a></td></tr>`;
                });
                document.getElementById('totalPoints').innerText = total.toFixed(1);
            }
        }

        document.getElementById('cmeForm').onsubmit = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            btn.innerText = "Saving..."; btn.disabled = true;

            const file = document.getElementById('cmeFile').files[0];
            const fileName = `${Date.now()}_${file.name}`;
            
            try {
                // 1. Upload
                await sb.storage.from('certificates').upload(`uploads/${fileName}`, file);
                const { data: { publicUrl } } = sb.storage.from('certificates').getPublicUrl(`uploads/${fileName}`);

                // 2. Insert (user_id එක යවන්නේ නැහැ, Supabase එක auto දාගන්නවා)
                const { error: dbErr } = await sb.from('cme_records').insert([{
                    user_email: userProfile.email,
                    date: document.getElementById('cmeDate').value,
                    topic: document.getElementById('cmeTopic').value,
                    organizer: document.getElementById('cmeOrganizer').value,
                    points: document.getElementById('cmePoints').value,
                    cert_url: publicUrl
                }]);

                if(dbErr) throw dbErr;
                alert("Saved!");
                toggleModal('addCmeModal');
                loadCmeData();
                document.getElementById('cmeForm').reset();
            } catch (err) { alert(err.message); }
            finally { btn.innerText = "Submit Record"; btn.disabled = false; }
        };

        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("CME Report - " + userProfile.full_name, 20, 20);
            doc.save("Report.pdf");
        }

        async function logout() { await sb.auth.signOut(); window.location.href = "login.html"; }
        init();
    </script>
</body>
</html>
