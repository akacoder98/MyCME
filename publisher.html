<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publisher - MyCME</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="bg-slate-800 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tighter">MyCME <span class="text-blue-400">PUBLISHER</span></h1>
            <button class="bg-red-500 text-sm px-4 py-1 rounded">Logout</button>
        </div>
    </nav>

    <main class="container mx-auto mt-10 p-4 max-w-4xl">
        <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
            <h2 class="text-2xl font-bold mb-6 text-slate-800">Post a New Event</h2>
            
            <form class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="col-span-2">
                    <label class="block text-sm font-medium text-slate-700 mb-1">Event Name / Topic</label>
                    <input type="text" placeholder="Annual Scientific Session 2026" class="w-full p-3 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Organizer (College/Uni)</label>
                    <input type="text" placeholder="Sri Lanka College of Cardiology" class="w-full p-3 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Event Date</label>
                    <input type="date" class="w-full p-3 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">CME Points Awarded</label>
                    <input type="number" step="0.5" placeholder="e.g. 2.5" class="w-full p-3 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Upload Banner (Optional)</label>
                    <input type="file" class="w-full p-2 text-sm text-slate-500 border border-dashed border-slate-300 rounded-lg">
                </div>

                <div class="col-span-2 mt-4">
                    <button type="button" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 shadow-lg shadow-blue-200 transition">
                        Publish Event
                    </button>
                </div>
            </form>
        </div>

        <div class="mt-10">
            <h3 class="font-bold text-slate-600 mb-4 text-lg">Your Published Events</h3>
            <div class="bg-white p-4 rounded-lg border border-slate-200 flex justify-between items-center italic text-slate-400">
                No events published yet.
            </div>
        </div>
    </main>

</body>
</html>
